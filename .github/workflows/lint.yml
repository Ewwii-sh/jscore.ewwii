name: JS Bootstrap Lint

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install ESLint
        run: |
          pnpm setup
          pnpm install -g eslint

      - name: Scan Files
        run: eslint "src/bootstrap//*.js"
